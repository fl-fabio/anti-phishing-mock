<!-- index.html -->
<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Cybersecurity Awareness Demo</title>
    </head>
    <body>
        <div class="container">

            <div class="card">

            <h1>Area Riservata</h1>

            <p class="subtitle">
                Simulazione didattica di raccolta dati in un attacco phishing.
            </p>

            <form id="loginForm">

                <div class="field">
                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Inserisci email"
                    required
                >
                </div>

                <div class="field">
                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Inserisci password"
                    required
                >
                </div>

                <button type="submit">
                Accedi
                </button>

            </form>

            <div id="messageBox"></div>

            </div>

        </div>
    </body>
</html>
